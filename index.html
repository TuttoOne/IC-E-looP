<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ICP Discovery Agent</title>
</head>
<body>
<div id="app-root" style="max-width: 720px; margin: 40px auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1A1D23;">
  <div style="border-bottom: 1px solid #E4E6EA; padding: 0 0 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;">
    <div>
      <div style="font-size: 18px; font-weight: 600;">ICP Discovery Agent</div>
      <div style="font-size: 13px; color: #6B7280; margin-top: 2px;">Connected via Claude Managed Agents</div>
    </div>
    <div id="status-pill" style="font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0;">Connecting...</div>
  </div>

  <div id="messages" style="display: flex; flex-direction: column; gap: 14px; min-height: 200px; padding-bottom: 12px;"></div>

  <div style="display: flex; gap: 8px; margin-top: 8px; position: sticky; bottom: 0; background: #fff; padding: 8px 0;">
    <textarea id="input-box" rows="1" placeholder="Type your message..." style="flex: 1; resize: none; border: 1px solid #D1D5DB; border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: inherit; outline: none;"></textarea>
    <button id="send-btn" style="background: #1A1D23; color: white; border: none; border-radius: 10px; padding: 0 18px; font-size: 14px; cursor: pointer; font-weight: 500;">Send</button>
  </div>
</div>

<script>
(function () {
  const BACKEND = ""; // same-origin; set to "http://localhost:3001" if served separately
  let sessionId = null;

  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("input-box");
  const sendBtn = document.getElementById("send-btn");
  const statusPill = document.getElementById("status-pill");

  function setStatus(text, tone) {
    const tones = {
      idle: ["#F0FDF4", "#15803D", "#BBF7D0"],
      busy: ["#FFF7ED", "#C2410C", "#FED7AA"],
      error: ["#FEF2F2", "#B91C1C", "#FCA5A5"],
    };
    const [bg, fg, bd] = tones[tone] || tones.idle;
    statusPill.textContent = text;
    statusPill.style.background = bg;
    statusPill.style.color = fg;
    statusPill.style.borderColor = bd;
  }

  function bubble(role, text) {
    const wrap = document.createElement("div");
    wrap.style.cssText = `align-self: ${role === "user" ? "flex-end" : "flex-start"}; max-width: 80%;`;
    const b = document.createElement("div");
    b.style.cssText = `padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; ${
      role === "user" ? "background: #1A1D23; color: white;" : "background: #F3F4F6; color: #1A1D23;"
    }`;
    b.textContent = text;
    wrap.appendChild(b);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function btnStyle(bg, fg) {
    return `background: ${bg}; color: ${fg}; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer;`;
  }

  function sendToolResult(toolUseId, text) {
    fetch(`${BACKEND}/api/session/${sessionId}/tool-result`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ toolUseId, text }),
    });
  }

  function sendToolConfirmation(toolUseId, allow) {
    fetch(`${BACKEND}/api/session/${sessionId}/tool-confirmation`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ toolUseId, allow }),
    });
  }

  // agent.custom_tool_use with name "present_draft"
  function draftCard(evt) {
    const { title, items, note } = evt.input;
    const card = document.createElement("div");
    card.style.cssText = "align-self: flex-start; max-width: 90%; border: 1px solid #E4E6EA; border-radius: 12px; padding: 14px 16px; background: #fff;";

    const badge = document.createElement("div");
    badge.textContent = "Proposal to review";
    badge.style.cssText = "font-size: 11px; font-weight: 600; color: #4338CA; background: #EEF2FF; display: inline-block; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px;";
    card.appendChild(badge);

    const h = document.createElement("div");
    h.textContent = title;
    h.style.cssText = "font-size: 15px; font-weight: 600; margin-bottom: 8px;";
    card.appendChild(h);

    const table = document.createElement("div");
    table.style.cssText = "display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px;";
    (items || []).forEach((it) => {
      const row = document.createElement("div");
      row.style.cssText = "display: flex; font-size: 13px; gap: 8px;";
      const l = document.createElement("span");
      l.textContent = it.label + " :";
      l.style.cssText = "color: #6B7280; min-width: 120px;";
      const v = document.createElement("span");
      v.textContent = it.value;
      v.style.fontWeight = "500";
      row.appendChild(l);
      row.appendChild(v);
      table.appendChild(row);
    });
    card.appendChild(table);

    if (note) {
      const n = document.createElement("div");
      n.textContent = note.replace(/\\n/g, "\n");
      n.style.cssText = "font-size: 12px; color: #6B7280; margin-bottom: 10px; font-style: italic; white-space: pre-wrap;";
      card.appendChild(n);
    }

    const actions = document.createElement("div");
    actions.style.cssText = "display: flex; gap: 8px; margin-top: 6px;";
    const editZone = document.createElement("div");
    editZone.style.cssText = "display: none; margin-top: 8px; gap: 6px; flex-direction: column;";
    const editArea = document.createElement("textarea");
    editArea.rows = 2;
    editArea.placeholder = "Describe your changes...";
    editArea.style.cssText = "border: 1px solid #D1D5DB; border-radius: 8px; padding: 8px; font-size: 13px; font-family: inherit; resize: none;";
    const editSend = document.createElement("button");
    editSend.textContent = "Send changes";
    editSend.style.cssText = btnStyle("#1A1D23", "white");
    editZone.appendChild(editArea);
    editZone.appendChild(editSend);

    function makeBtn(label, bg, fg) {
      const b = document.createElement("button");
      b.textContent = label;
      b.style.cssText = btnStyle(bg, fg);
      return b;
    }

    const validateBtn = makeBtn("Validate", "#15803D", "white");
    const editBtn = makeBtn("Edit", "#fff", "#1A1D23");
    editBtn.style.border = "1px solid #D1D5DB";
    const rejectBtn = makeBtn("Reject", "#fff", "#B91C1C");
    rejectBtn.style.border = "1px solid #FCA5A5";

    function disableAll() {
      [validateBtn, editBtn, rejectBtn, editSend].forEach((b) => (b.disabled = true));
      card.style.opacity = "0.75";
    }

    validateBtn.onclick = () => {
      disableAll();
      bubble("user", "Validated: " + title);
      sendToolResult(evt.id, "Validated as is.");
    };
    editBtn.onclick = () => (editZone.style.display = "flex");
    editSend.onclick = () => {
      const val = editArea.value.trim();
      if (!val) return;
      disableAll();
      bubble("user", "Requested change: " + val);
      sendToolResult(evt.id, "The user wants this changed as follows: " + val);
    };
    rejectBtn.onclick = () => {
      editZone.style.display = "flex";
      editArea.placeholder = "Why are you rejecting this proposal? (optional)";
      editSend.textContent = "Confirm rejection";
      editSend.onclick = () => {
        disableAll();
        const reason = editArea.value.trim();
        bubble("user", "Rejected" + (reason ? ": " + reason : ""));
        sendToolResult(evt.id, "Rejected by the user." + (reason ? " Reason: " + reason : ""));
      };
    };

    actions.appendChild(validateBtn);
    actions.appendChild(editBtn);
    actions.appendChild(rejectBtn);
    card.appendChild(actions);
    card.appendChild(editZone);
    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // The model occasionally emits `options` as a malformed string instead of
  // an array (e.g. `a", "b", "c`) — normalize it back into an array.
  function normalizeOptions(options) {
    if (Array.isArray(options)) return options;
    if (typeof options !== "string") return [];
    try {
      const parsed = JSON.parse('["' + options + '"]');
      if (Array.isArray(parsed)) return parsed;
    } catch {}
    return options.split(/"\s*,\s*"/).map((s) => s.replace(/^"+|"+$/g, "").trim()).filter(Boolean);
  }

  // agent.custom_tool_use with name "ask_choice"
  function choiceCard(evt) {
    const { question } = evt.input;
    const options = normalizeOptions(evt.input.options);
    const card = document.createElement("div");
    card.style.cssText = "align-self: flex-start; max-width: 90%; border: 1px solid #E4E6EA; border-radius: 12px; padding: 14px 16px; background: #fff;";
    const q = document.createElement("div");
    q.textContent = question;
    q.style.cssText = "font-size: 14px; font-weight: 500; margin-bottom: 10px;";
    card.appendChild(q);
    const opts = document.createElement("div");
    opts.style.cssText = "display: flex; flex-wrap: wrap; gap: 8px;";

    const freeZone = document.createElement("div");
    freeZone.style.cssText = "display: none; margin-top: 8px; gap: 6px; flex-direction: column;";
    const freeArea = document.createElement("textarea");
    freeArea.rows = 2;
    freeArea.placeholder = "Your answer...";
    freeArea.style.cssText = "border: 1px solid #D1D5DB; border-radius: 8px; padding: 8px; font-size: 13px; font-family: inherit; resize: none;";
    const freeSend = document.createElement("button");
    freeSend.textContent = "Send";
    freeSend.style.cssText = btnStyle("#1A1D23", "white");
    freeZone.appendChild(freeArea);
    freeZone.appendChild(freeSend);

    function answer(text) {
      Array.from(opts.children).forEach((c) => (c.disabled = true));
      freeArea.disabled = freeSend.disabled = true;
      card.style.opacity = "0.75";
      bubble("user", text);
      sendToolResult(evt.id, text);
    }

    (options || []).forEach((opt) => {
      const b = document.createElement("button");
      b.textContent = opt;
      b.style.cssText = btnStyle("#fff", "#1A1D23") + "border: 1px solid #D1D5DB;";
      b.onclick = () => answer(opt);
      opts.appendChild(b);
    });

    const otherBtn = document.createElement("button");
    otherBtn.textContent = "Other…";
    otherBtn.style.cssText = btnStyle("#fff", "#6B7280") + "border: 1px dashed #D1D5DB;";
    otherBtn.onclick = () => {
      freeZone.style.display = "flex";
      freeArea.focus();
    };
    opts.appendChild(otherBtn);

    freeSend.onclick = () => {
      const val = freeArea.value.trim();
      if (val) answer(val);
    };

    card.appendChild(opts);
    card.appendChild(freeZone);
    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Renders the scoring agent's JSON output as cards. Returns false when the
  // text isn't a scoring payload, so the caller falls back to a plain bubble.
  function tryScoringCards(text) {
    const fence = text.match(/```json\s*([\s\S]*?)```/);
    const raw = fence ? fence[1] : (text.trim().startsWith("{") ? text.trim() : null);
    if (!raw) return false;
    let obj;
    try { obj = JSON.parse(raw); } catch { return false; }
    const segs = obj.scored_segments || obj.ranking;
    if (!Array.isArray(segs) || !segs.length) return false;

    segs.forEach(scoreCard);
    const killed = obj.killed_segments || obj.segments_killed || [];
    bubble(
      "assistant",
      "Scoring complete — " + segs.length + " segment(s) scored, " +
        (killed.length ? "killed: " + killed.join(", ") : "no segment killed") + "."
    );
    return true;
  }

  function scoreCard(seg) {
    const card = document.createElement("div");
    card.style.cssText = "align-self: flex-start; max-width: 90%; border: 1px solid #E4E6EA; border-radius: 12px; padding: 14px 16px; background: #fff;";

    const badge = document.createElement("div");
    badge.textContent = seg.rank ? "Scoring — rank #" + seg.rank : "Scoring";
    badge.style.cssText = "font-size: 11px; font-weight: 600; color: #4338CA; background: #EEF2FF; display: inline-block; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px;";
    card.appendChild(badge);

    const h = document.createElement("div");
    h.textContent = seg.segment_name || seg.segment_id;
    h.style.cssText = "font-size: 15px; font-weight: 600; margin-bottom: 4px;";
    card.appendChild(h);

    const total = document.createElement("div");
    const conf = seg.overall_confidence ? " · confidence " + seg.overall_confidence : "";
    total.textContent = "Overall score: " + (seg.weighted_total ?? "—") + " / 5" + conf;
    total.style.cssText = "font-size: 13px; font-weight: 600; color: #15803D; margin-bottom: 10px;";
    card.appendChild(total);

    Object.entries(seg.scores || {}).forEach(([name, s]) => {
      const row = document.createElement("div");
      row.style.cssText = "margin-bottom: 8px;";
      const label = document.createElement("div");
      const val = s.score ?? s.value;
      const unscoreable = val === null || val === undefined || s.confidence === "unscoreable";
      label.textContent = name + ": " + (unscoreable ? "unscoreable" : val + "/5");
      label.style.cssText = "font-size: 13px; font-weight: 500;";
      row.appendChild(label);
      if (!unscoreable) {
        const track = document.createElement("div");
        track.style.cssText = "height: 4px; background: #E4E6EA; border-radius: 2px; margin: 4px 0;";
        const fill = document.createElement("div");
        fill.style.cssText = `height: 4px; width: ${(val / 5) * 100}%; background: #4338CA; border-radius: 2px;`;
        track.appendChild(fill);
        row.appendChild(track);
      }
      if (s.rationale) {
        const why = document.createElement("div");
        why.textContent = s.rationale;
        why.style.cssText = "font-size: 12px; color: #6B7280; line-height: 1.4;";
        row.appendChild(why);
      }
      card.appendChild(row);
    });

    if (Array.isArray(seg.knowledge_gaps) && seg.knowledge_gaps.length) {
      const gapsTitle = document.createElement("div");
      gapsTitle.textContent = "To verify (knowledge gaps)";
      gapsTitle.style.cssText = "font-size: 12px; font-weight: 600; color: #C2410C; margin: 10px 0 4px;";
      card.appendChild(gapsTitle);
      seg.knowledge_gaps.forEach((g) => {
        const gap = document.createElement("div");
        const route = g.route_to || g.resolve_via;
        gap.textContent = "• " + (g.gap || g.why_it_matters || g.dimension) + (route ? " → " + route : "");
        gap.style.cssText = "font-size: 12px; color: #6B7280; line-height: 1.4; margin-bottom: 3px;";
        card.appendChild(gap);
      });
    }

    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // agent.custom_tool_use with name "submit_ranking" — the Scoring Agent's
  // structured final output (strict schema, no free-text JSON guessing).
  function renderRanking(evt) {
    const { ranking, segments_killed } = evt.input || {};
    (ranking || []).forEach(scoreCard);

    const card = document.createElement("div");
    card.style.cssText = "align-self: flex-start; max-width: 90%; border: 1px solid #BBF7D0; background: #F0FDF4; border-radius: 12px; padding: 14px 16px;";

    const badge = document.createElement("div");
    badge.textContent = "Scoring complete";
    badge.style.cssText = "font-size: 11px; font-weight: 600; color: #15803D; background: #DCFCE7; display: inline-block; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px;";
    card.appendChild(badge);

    const summary = document.createElement("div");
    summary.textContent = (ranking || []).length + " segment(s) retained and ranked.";
    summary.style.cssText = "font-size: 13px; font-weight: 500; margin-bottom: 6px;";
    card.appendChild(summary);

    const list = document.createElement("ol");
    list.style.cssText = "margin: 0 0 8px; padding-left: 18px; font-size: 13px;";
    (ranking || [])
      .slice()
      .sort((a, b) => (a.rank ?? 0) - (b.rank ?? 0))
      .forEach((seg) => {
        const li = document.createElement("li");
        li.textContent = (seg.segment_name || seg.segment_id) + " — " + seg.weighted_total + " / 5";
        list.appendChild(li);
      });
    card.appendChild(list);

    if (segments_killed && segments_killed.length) {
      const killedTitle = document.createElement("div");
      killedTitle.textContent = "Killed (Kill Gate 1)";
      killedTitle.style.cssText = "font-size: 12px; font-weight: 600; color: #B91C1C; margin: 6px 0 4px;";
      card.appendChild(killedTitle);
      segments_killed.forEach((k) => {
        const row = document.createElement("div");
        row.textContent = "• " + k.segment_id + " — " + k.reason;
        row.style.cssText = "font-size: 12px; color: #6B7280; line-height: 1.4; margin-bottom: 2px;";
        card.appendChild(row);
      });
    } else {
      const none = document.createElement("div");
      none.textContent = "No segment killed.";
      none.style.cssText = "font-size: 12px; color: #6B7280;";
      card.appendChild(none);
    }

    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    sendToolResult(evt.id, "Ranking displayed to the user.");
  }

  // Generic confirmation for built-in / MCP tools gated by a permission policy
  function confirmationCard(evt, toolLabel) {
    const card = document.createElement("div");
    card.style.cssText = "align-self: flex-start; max-width: 90%; border: 1px solid #FED7AA; background: #FFF7ED; border-radius: 12px; padding: 12px 16px;";
    const q = document.createElement("div");
    q.textContent = "The agent wants to run: " + toolLabel;
    q.style.cssText = "font-size: 13px; margin-bottom: 8px;";
    card.appendChild(q);
    const row = document.createElement("div");
    row.style.cssText = "display: flex; gap: 8px;";
    const allow = document.createElement("button");
    allow.textContent = "Allow";
    allow.style.cssText = btnStyle("#15803D", "white");
    const deny = document.createElement("button");
    deny.textContent = "Deny";
    deny.style.cssText = btnStyle("#fff", "#B91C1C") + "border: 1px solid #FCA5A5;";
    allow.onclick = () => {
      allow.disabled = deny.disabled = true;
      card.style.opacity = "0.75";
      sendToolConfirmation(evt.id, true);
    };
    deny.onclick = () => {
      allow.disabled = deny.disabled = true;
      card.style.opacity = "0.75";
      sendToolConfirmation(evt.id, false);
    };
    row.appendChild(allow);
    row.appendChild(deny);
    card.appendChild(row);
    messagesEl.appendChild(card);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function handleEvent(evt) {
    switch (evt.type) {
      case "agent.message":
        (evt.content || []).forEach((block) => {
          if (block.type === "text" && block.text.trim() && !tryScoringCards(block.text)) {
            bubble("assistant", block.text.trim());
          }
        });
        break;
      case "agent.custom_tool_use":
        if (evt.name === "present_draft") draftCard(evt);
        else if (evt.name === "ask_choice") choiceCard(evt);
        else if (evt.name === "submit_segments") startScoring(evt);
        else if (evt.name === "submit_ranking") renderRanking(evt);
        break;
      case "agent.tool_use":
      case "agent.mcp_tool_use":
        // Only relevant when it shows up inside a requires_action pause (see below);
        // otherwise it's just an FYI that a built-in tool ran automatically.
        break;
      case "session.status_idle":
        if (evt.stop_reason?.type === "requires_action") {
          setStatus("Waiting for your answer", "busy");
        } else {
          setStatus("Ready", "idle");
        }
        break;
    }
  }

  let es = null;
  function connectStream() {
    if (es) es.close();
    es = new EventSource(`${BACKEND}/api/session/${sessionId}/stream`);
    es.onmessage = (e) => handleEvent(JSON.parse(e.data));
    es.onerror = () => setStatus("Connection lost", "error");
  }

  // Called when the questioning agent signals that all segments were
  // validated (submit_segments): switch the UI to a fresh scoring session.
  async function startScoring(evt) {
    sendToolResult(evt.id, "Segments handed off to the Scoring Agent.");
    bubble("assistant", "✅ Segments validated — starting the Scoring Agent…");
    setStatus("Connecting to the Scoring Agent...", "busy");
    let r, data;
    try {
      r = await fetch(`${BACKEND}/api/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ agent: "scoring" }),
      });
      data = await r.json();
    } catch (err) {
      setStatus("Connection error", "error");
      bubble("assistant", "Backend unreachable while starting scoring: " + err.message);
      return;
    }
    if (!r.ok) {
      setStatus("Connection error", "error");
      bubble("assistant", "Could not create the scoring session: " + JSON.stringify(data));
      return;
    }
    sessionId = data.sessionId;
    connectStream();
    sendMessage(
      "Here are the ICP segments validated by the user. Score them using your methodology and return the ranking.\n\n" +
        JSON.stringify(evt.input, null, 2),
      true
    );
  }

  async function startSession() {
    setStatus("Connecting...", "busy");
    const r = await fetch(`${BACKEND}/api/session`, { method: "POST" });
    const data = await r.json();
    if (!r.ok) {
      setStatus("Connection error", "error");
      bubble("assistant", "Could not create the session: " + JSON.stringify(data));
      return;
    }
    sessionId = data.sessionId;
    connectStream();
    setStatus("Ready", "idle");
    sendMessage("Hi, I want to define my B2B ICPs.", true);
  }

  function sendMessage(text, silent) {
    if (!silent) bubble("user", text);
    setStatus("Agent is thinking...", "busy");
    fetch(`${BACKEND}/api/session/${sessionId}/message`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
  }

  sendBtn.onclick = () => {
    const text = input.value.trim();
    if (!text || !sessionId) return;
    input.value = "";
    sendMessage(text);
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  startSession();
})();
</script>
</body>
</html>
